name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PowerShell validator
        shell: pwsh
        run: pwsh scripts/validate.ps1 -Verbose
      - name: Run Bash validator
        run: bash scripts/validate.sh --verbose
